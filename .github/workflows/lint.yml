name: Lint

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  lint-r:
    name: R syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.3'

      - name: Check R script syntax
        run: |
          echo "Checking R scripts for syntax errors..."
          error=0
          for f in bin/*.R; do
            echo "  Checking $f"
            Rscript --vanilla -e "
              result <- tryCatch(
                parse('$f'),
                error = function(e) {
                  cat('SYNTAX ERROR in $f:', conditionMessage(e), '\n')
                  quit(status = 1)
                }
              )
              cat('OK: $f\n')
            " || error=1
          done
          if [ $error -ne 0 ]; then
            echo "One or more R scripts have syntax errors."
            exit 1
          fi
          echo "All R scripts passed syntax check."

  lint-nextflow:
    name: Nextflow syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/
          nextflow -version

      - name: Validate Nextflow pipeline
        run: |
          echo "Validating main.nf..."
          nextflow inspect main.nf -profile conda 2>&1 | head -50
          echo "Nextflow validation complete."

  lint-docker:
    name: Dockerfile lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          ignore: DL3008,DL3009,DL3015
          # DL3008: pin apt versions (too strict for research pipelines)
          # DL3009: delete apt lists (already done)
          # DL3015: avoid additional packages (R needs them)
